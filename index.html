<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeKiffe - Emprunts</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .text-input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    .text-input:focus {
      border-color: var(--primary);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-primary {
      background: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-success {
      background: var(--success);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-warning {
      background: var(--warning);
    }

    .status-box {
      border-radius: 14px;
      padding: 14px;
      background: #f9fafb;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 14px;
    }

    .status-box strong {
      color: var(--text);
    }

    .hidden {
      display: none !important;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .results {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .result-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
      cursor: pointer;
    }

    .result-item:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .result-main {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      margin-bottom: 14px;
    }

    .badge-ok {
      background: var(--success);
    }

    .badge-ko {
      background: var(--danger);
    }

    .motif {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-size: 14px;
      line-height: 1.4;
    }

    .infos {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 16px;
    }

    .info-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
    }

    .info-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selected-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .selected-box strong {
      display: block;
      margin-bottom: 6px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">

  <header class="header">
    <h1 class="title">Gestion des emprunts</h1>
    <p class="subtitle" id="headerSubtitle">
      Recherche un adhérent pour commencer.
    </p>
  </header>

  <!-- ========================= -->
  <!-- RECHERCHE ADHERENT -->
  <!-- ========================= -->
  <section id="viewAdherent" class="view active">
    <div class="card">
      <h2 class="section-title">Rechercher un adhérent</h2>

      <div class="input-row">
        <input id="adherentInput" class="text-input"
          placeholder="Nom / prénom ou scan"
          oninput="rechercheAutoAdherent()"
          onkeydown="if(event.key==='Enter'){rechercherAdherentUnique();}">
        <button class="btn btn-primary" onclick="rechercherAdherentUnique()">Rechercher</button>
      </div>

      <div id="adherentResults" class="results hidden"></div>

      <div class="actions">
        <button class="btn btn-primary" onclick="ouvrirRetourAccueil()">Retour de jeux</button>
      </div>

      <div id="statusAdherent" class="status-box"></div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- FICHE ADHERENT -->
  <!-- ========================= -->
  <section id="viewFiche" class="view">
    <div class="card">
      <h2 class="section-title">Fiche adhérent</h2>

      <div id="nomComplet" class="name"></div>
      <div id="badgeStatut" class="badge"></div>
      <div id="motifBlocage" class="motif hidden"></div>

      <div class="infos">
        <div class="info-item"><div class="info-label">Emprunts</div><div id="empruntsEnCours"></div></div>
        <div class="info-item"><div class="info-label">Statut</div><div id="statutEmprunt"></div></div>
        <div class="info-item"><div class="info-label">Jeux</div><div id="jeuxEnCours"></div></div>
        <div class="info-item"><div class="info-label">Retards</div><div id="nbRetards"></div></div>
      </div>

      <div class="actions">
        <button id="btnChoisirJeu" class="btn btn-success hidden" onclick="ouvrirVueJeu()">Emprunter</button>
        <button class="btn btn-warning" onclick="retourRechercheAdherent()">Changer</button>
      </div>

      <div id="statusFiche" class="status-box"></div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- RECHERCHE JEU -->
  <!-- ========================= -->
  <section id="viewJeu" class="view">
    <div class="card">
      <h2 class="section-title">Choisir un jeu</h2>

      <div class="input-row">
        <input id="jeuInput" class="text-input"
          placeholder="Nom ou scan"
          oninput="rechercheAutoJeu()"
          onkeydown="if(event.key==='Enter'){rechercherJeuUnique();}">
        <button class="btn btn-primary" onclick="rechercherJeuUnique()">Rechercher</button>
      </div>

      <div id="jeuResults" class="results hidden"></div>

      <div id="jeuSelection" class="selected-box hidden">
        <strong id="jeuNomSelection"></strong>
        <span id="jeuEtatSelection"></span>
      </div>

      <div id="exemplairesBloc" class="hidden">
        <div id="exemplairesZone" class="results"></div>
      </div>

      <div class="actions">
        <button id="btnValiderEmprunt" class="btn btn-success hidden" onclick="validerEmprunt()">Valider</button>
        <button class="btn btn-warning" onclick="retourFicheAdherent()">Retour</button>
      </div>

      <div id="statusJeu" class="status-box"></div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- RETOUR ACCUEIL -->
  <!-- ========================= -->
  <section id="viewRetourAccueil" class="view">
    <div class="card">
      <h2 class="section-title">Retour</h2>

      <div class="actions">
        <button class="btn btn-primary" onclick="ouvrirRetourUnique()">Retour simple</button>
        <button class="btn btn-primary" onclick="ouvrirRetourMultiple()">Retour multiple</button>
      </div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- RETOUR UNIQUE -->
  <!-- ========================= -->
  <section id="viewRetourUnique" class="view">
    <div class="card">
      <h2 class="section-title">Retour d’un jeu</h2>

      <input id="retourInput" class="text-input"
        placeholder="Nom jeu ou scan"
        oninput="rechercheAutoRetourUnique()">

      <div id="retourResults" class="results hidden"></div>
      <div id="retourStatus" class="status-box"></div>

      <div class="actions">
        <button class="btn btn-warning" onclick="ouvrirRetourAccueil()">Retour</button>
      </div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- CONFIRMATION -->
  <!-- ========================= -->
  <section id="viewRetourConfirm" class="view">
    <div class="card">
      <h2 class="section-title">Confirmer</h2>

      <div class="infos">
        <div class="info-item"><div class="info-label">Jeu</div><div id="retourConfirmJeu"></div></div>
        <div class="info-item"><div class="info-label">Exemplaire</div><div id="retourConfirmExemplaire"></div></div>
        <div class="info-item"><div class="info-label">Adhérent</div><div id="retourConfirmAdherent"></div></div>
        <div class="info-item"><div class="info-label">Retard</div><div id="retourConfirmRetard"></div></div>
      </div>

      <div class="actions">
        <button class="btn btn-success" onclick="confirmerRetour()">Confirmer</button>
        <button class="btn btn-warning" onclick="ouvrirRetourUnique()">Annuler</button>
      </div>
    </div>
  </section>

  <!-- ========================= -->
  <!-- SUCCES -->
  <!-- ========================= -->
  <section id="viewRetourSucces" class="view">
    <div class="card">
      <h2 class="section-title">Retour effectué</h2>

      <div id="retourSuccesDetail" class="selected-box"></div>

      <div class="actions">
        <button class="btn btn-success" onclick="ouvrirRetourUnique()">Autre retour</button>
        <button class="btn btn-primary" onclick="ouvrirRetourAccueil()">Accueil</button>
      </div>
    </div>
  </section>

</div>

  <script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxvASN1BbWvvwLn2zRg_t_1GgysJaeNk2jJhQMMXHitTdrea8Ub2a3Kq-7pZpBVTMRSLQ/exec";

let adherentsIndex = [];
let jeuxIndex = [];

let adherentCourant = null;
let jeuCourant = null;
let exemplaireChoisi = null;

let retourCourant = null;
let timerRetourUnique = null;


// ============================
// INIT
// ============================

async function chargerIndex() {
  try {
    const resAdh = await fetch(API_URL + "?action=getAdherentsIndex");
    adherentsIndex = (await resAdh.json()).data || [];

    const resJeux = await fetch(API_URL + "?action=getJeuxIndex");
    jeuxIndex = (await resJeux.json()).data || [];

  } catch (e) {
    console.error(e);
  }
}


// ============================
// UI
// ============================

function setStatus(id, title, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = "<strong>" + title + "</strong><br>" + text;
}

function showView(viewId) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(viewId).classList.add("active");
}


// ============================
// RETOUR UNIQUE
// ============================

function rechercheAutoRetourUnique() {
  clearTimeout(timerRetourUnique);

  timerRetourUnique = setTimeout(() => {
    const input = document.getElementById("retourInput").value.trim();
    if (input.length >= 2) rechercherRetourUnique();
  }, 300);
}


async function rechercherRetourUnique() {
  const input = document.getElementById("retourInput").value.trim();

  if (!input) {
    setStatus("retourStatus", "Erreur", "Saisis une valeur.");
    return;
  }

  setStatus("retourStatus", "Recherche", "...");

  // ========= CAS EXEMPLAIRE =========
  if (input.includes("-")) {
    traiterRetourExemplaire(input);
    return;
  }

  // ========= CAS NOM =========
  const query = input.toLowerCase();

  const results = jeuxIndex.filter(j =>
    j.nom_jeu.toLowerCase().includes(query)
  );

  if (results.length === 0) {
    setStatus("retourStatus", "Aucun résultat", "Aucun jeu.");
    return;
  }

  if (results.length === 1) {
    chargerEmpruntsJeu(results[0].id_jeu);
    return;
  }

  const box = document.getElementById("retourResults");
  box.innerHTML = "";

  results.forEach(j => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.textContent = j.nom_jeu;

    div.onclick = () => {
      chargerEmpruntsJeu(j.id_jeu);
      box.classList.add("hidden");
    };

    box.appendChild(div);
  });

  box.classList.remove("hidden");
}


// ============================
// CHARGER EMPRUNTS
// ============================

async function chargerEmpruntsJeu(idJeu) {
  setStatus("retourStatus", "Chargement", "...");

  const res = await fetch(API_URL + "?action=getEmpruntsActifsByJeu&id_jeu=" + idJeu);
  const data = await res.json();

  const box = document.getElementById("retourResults");
  box.innerHTML = "";

  if (!data.emprunts || data.emprunts.length === 0) {
    setStatus("retourStatus", "Aucun emprunt", "");
    return;
  }

  // ✅ 1 seul → direct
  if (data.emprunts.length === 1) {
    traiterRetourExemplaire(data.emprunts[0].id_exemplaire);
    return;
  }

  // ⚠️ plusieurs → choix
  data.emprunts.forEach(e => {
    const div = document.createElement("div");
    div.className = "result-item";
    div.innerHTML = `
      <strong>${e.nom_adherent}</strong><br>
      ${e.id_exemplaire}
    `;

    div.onclick = () => {
      traiterRetourExemplaire(e.id_exemplaire);
    };

    box.appendChild(div);
  });

  box.classList.remove("hidden");
}


// ============================
// TRAITER EXEMPLAIRE
// ============================

async function traiterRetourExemplaire(idEx) {
  const res = await fetch(API_URL + "?action=getEmpruntActifByExemplaire&id_exemplaire=" + idEx);
  const data = await res.json();

  if (!data.has_active_emprunt) {
    setStatus("retourStatus", "Erreur", "Pas emprunté.");
    return;
  }

  retourCourant = idEx;

  document.getElementById("confirmTexte").textContent =
    "Retour de " + idEx + " (" + data.nom_adherent + ")";

  showView("viewConfirm");
}


// ============================
// CONFIRMER
// ============================

async function confirmerRetour() {
  await fetch(API_URL + "?action=retourJeuByExemplaire&id_exemplaire=" + retourCourant);

  document.getElementById("successTexte").textContent =
    "Retour effectué : " + retourCourant;

  showView("viewSuccess");
}


// ============================

window.onload = chargerIndex;

</script>
  
</body>
</html>
