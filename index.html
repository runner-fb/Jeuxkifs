<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeKiffe - Emprunts</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 840px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .text-input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    .text-input:focus {
      border-color: var(--primary);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-success {
      background: var(--success);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-warning {
      background: var(--warning);
    }

    .status-box {
      border-radius: 14px;
      padding: 14px;
      background: #f9fafb;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status-box strong {
      color: var(--text);
    }

    .hidden {
      display: none !important;
    }

    .fiche {
      display: none;
    }

    .fiche.visible {
      display: block;
    }

    .fiche-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .badge-ok {
      background: var(--success);
    }

    .badge-ko {
      background: var(--danger);
    }

    .motif {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-size: 14px;
      line-height: 1.4;
    }

    .infos {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 8px;
    }

    .info-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
    }

    .info-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .results {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .result-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
      cursor: pointer;
    }

    .result-item:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .result-main {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
    }

    .selected-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .selected-box strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 700px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Gestion des emprunts</h1>
      <p class="subtitle">
        Recherche un adhérent, puis choisis un jeu à emprunter.
      </p>
    </header>

    <section class="card">
      <label for="adherentInput" class="label">Adhérent</label>
      <div class="input-row">
        <input
          id="adherentInput"
          class="text-input"
          type="text"
          placeholder="Scanne un identifiant ou saisis nom / prénom"
          onkeydown="if(event.key === 'Enter') rechercherAdherentUnique()"
        />
        <button class="btn btn-primary" onclick="rechercherAdherentUnique()">
          Rechercher
        </button>
      </div>

      <div id="adherentResults" class="results hidden"></div>
    </section>

    <section class="card">
      <div id="statusBox" class="status-box">
        <strong>Prêt.</strong><br>
        En attente d’une recherche adhérent.
      </div>
    </section>

    <section id="ficheAdherent" class="card fiche">
      <div class="fiche-header">
        <div id="nomComplet" class="name"></div>
        <div id="badgeStatut" class="badge"></div>
      </div>

      <div id="motifBlocage" class="motif hidden"></div>

      <div class="infos">
        <div class="info-item">
          <div class="info-label">Emprunts en cours</div>
          <div id="empruntsEnCours" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Statut emprunt</div>
          <div id="statutEmprunt" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Jeux en cours</div>
          <div id="jeuxEnCours" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Nombre de retards</div>
          <div id="nbRetards" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Profil</div>
          <div id="profil" class="info-value"></div>
        </div>
      </div>

      <div class="actions">
        <button id="btnChoisirJeu" class="btn btn-success hidden" onclick="ouvrirBlocJeu()">
          Choisir un jeu
        </button>

        <button class="btn btn-danger" onclick="reinitialiserTout()">
          Réinitialiser
        </button>
      </div>
    </section>

    <section id="blocJeu" class="card hidden">
      <h2 class="section-title">Choix du jeu</h2>

      <label for="jeuInput" class="label">Jeu</label>
      <div class="input-row">
        <input
          id="jeuInput"
          class="text-input"
          type="text"
          placeholder="Scanne un code-barres ou saisis un nom de jeu"
          onkeydown="if(event.key === 'Enter') rechercherJeuUnique()"
        />
        <button class="btn btn-primary" onclick="rechercherJeuUnique()">
          Rechercher
        </button>
      </div>

      <div id="jeuResults" class="results hidden"></div>

      <div id="jeuSelection" class="selected-box hidden">
        <strong id="jeuNomSelection"></strong>
        <span id="jeuEtatSelection"></span>
      </div>

      <div id="exemplairesZone" class="results hidden"></div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxvASN1BbWvvwLn2zRg_t_1GgysJaeNk2jJhQMMXHitTdrea8Ub2a3Kq-7pZpBVTMRSLQ/exec";

    let adherentCourant = null;
    let jeuCourant = null;
    let exemplaireChoisi = null;

    function setStatus(title, text) {
      const box = document.getElementById("statusBox");
      box.innerHTML = "<strong>" + title + "</strong><br>" + text;
    }

    function afficherFicheAdherent(data) {
      adherentCourant = data;

      document.getElementById("ficheAdherent").classList.add("visible");
      document.getElementById("nomComplet").textContent = data.nom_complet || "";

      const badge = document.getElementById("badgeStatut");
      const peutEmprunter = String(data.peut_emprunter || "").toLowerCase() === "oui";

      badge.textContent = peutEmprunter ? "Peut emprunter" : "Emprunt impossible";
      badge.className = "badge " + (peutEmprunter ? "badge-ok" : "badge-ko");

      const motifBox = document.getElementById("motifBlocage");
      if (!peutEmprunter && data.motif_blocage) {
        motifBox.textContent = data.motif_blocage;
        motifBox.classList.remove("hidden");
      } else {
        motifBox.textContent = "";
        motifBox.classList.add("hidden");
      }

      document.getElementById("empruntsEnCours").textContent = data.emprunts_en_cours ?? "";
      document.getElementById("statutEmprunt").textContent = data.statut_emprunt || "";
      document.getElementById("jeuxEnCours").textContent = data.jeux_en_cours || "";
      document.getElementById("nbRetards").textContent = data.nb_retards ?? "";
      document.getElementById("profil").textContent = data.profil || "";

      const btnChoisirJeu = document.getElementById("btnChoisirJeu");
      if (peutEmprunter) {
        btnChoisirJeu.classList.remove("hidden");
      } else {
        btnChoisirJeu.classList.add("hidden");
        document.getElementById("blocJeu").classList.add("hidden");
      }
    }

    function reinitialiserTout() {
      adherentCourant = null;
      jeuCourant = null;
      exemplaireChoisi = null;

      document.getElementById("adherentInput").value = "";
      document.getElementById("jeuInput").value = "";

      document.getElementById("adherentResults").innerHTML = "";
      document.getElementById("adherentResults").classList.add("hidden");

      document.getElementById("jeuResults").innerHTML = "";
      document.getElementById("jeuResults").classList.add("hidden");

      document.getElementById("ficheAdherent").classList.remove("visible");
      document.getElementById("blocJeu").classList.add("hidden");

      document.getElementById("jeuSelection").classList.add("hidden");
      document.getElementById("jeuNomSelection").textContent = "";
      document.getElementById("jeuEtatSelection").textContent = "";

      document.getElementById("exemplairesZone").innerHTML = "";
      document.getElementById("exemplairesZone").classList.add("hidden");

      setStatus("Prêt.", "En attente d’une recherche adhérent.");
      document.getElementById("adherentInput").focus();
    }

    async function rechercherAdherentUnique() {
      const input = document.getElementById("adherentInput").value.trim();
      const resultsBox = document.getElementById("adherentResults");

      if (!input) {
        setStatus("Recherche vide", "Saisis un identifiant, un nom ou un prénom.");
        resultsBox.innerHTML = "";
        resultsBox.classList.add("hidden");
        return;
      }

      setStatus("Recherche adhérent", "Vérification en cours...");
      resultsBox.innerHTML = "";
      resultsBox.classList.add("hidden");
      document.getElementById("ficheAdherent").classList.remove("visible");
      document.getElementById("blocJeu").classList.add("hidden");

      try {
        const directUrl = API_URL
          + "?action=getAdherentByCode"
          + "&code=" + encodeURIComponent(input);

        const directResponse = await fetch(directUrl);
        const directData = await directResponse.json();

        if (directData.found) {
          afficherFicheAdherent(directData);

          if (String(directData.peut_emprunter || "").toLowerCase() === "oui") {
            setStatus("Adhérent autorisé", "Tu peux choisir un jeu.");
          } else {
            setStatus("Adhérent bloqué", directData.motif_blocage || "Emprunt impossible.");
          }
          return;
        }

        const searchUrl = API_URL
          + "?action=searchAdherents"
          + "&query=" + encodeURIComponent(input);

        const searchResponse = await fetch(searchUrl);
        const searchData = await searchResponse.json();

        if (!searchData.ok || !Array.isArray(searchData.results) || searchData.results.length === 0) {
          setStatus("Aucun résultat", "Aucun adhérent ne correspond à cette recherche.");
          return;
        }

        searchData.results.forEach(item => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <div class="result-main">${item.nom_complet}</div>
            <div class="result-sub">ID : ${item.id_adherent} · Profil : ${item.profil}</div>
          `;
          div.onclick = () => {
            document.getElementById("adherentInput").value = item.id_adherent;
            afficherFicheAdherent(item);

            if (String(item.peut_emprunter || "").toLowerCase() === "oui") {
              setStatus("Adhérent sélectionné", "Tu peux choisir un jeu.");
            } else {
              setStatus("Adhérent bloqué", item.motif_blocage || "Emprunt impossible.");
            }

            resultsBox.classList.add("hidden");
          };
          resultsBox.appendChild(div);
        });

        resultsBox.classList.remove("hidden");
        setStatus("Résultats trouvés", "Choisis un adhérent dans la liste.");

      } catch (error) {
        setStatus("Erreur", error.message);
      }
    }

    function ouvrirBlocJeu() {
      jeuCourant = null;
      exemplaireChoisi = null;

      document.getElementById("blocJeu").classList.remove("hidden");
      document.getElementById("jeuInput").value = "";
      document.getElementById("jeuResults").innerHTML = "";
      document.getElementById("jeuResults").classList.add("hidden");
      document.getElementById("jeuSelection").classList.add("hidden");
      document.getElementById("jeuNomSelection").textContent = "";
      document.getElementById("jeuEtatSelection").textContent = "";
      document.getElementById("exemplairesZone").innerHTML = "";
      document.getElementById("exemplairesZone").classList.add("hidden");

      document.getElementById("jeuInput").focus();
      setStatus("Choix du jeu", "Scanne un code-barres ou saisis un nom de jeu.");
    }

    async function rechercherJeuUnique() {
      const input = document.getElementById("jeuInput").value.trim();
      const resultsBox = document.getElementById("jeuResults");

      if (!input) {
        setStatus("Recherche vide", "Saisis un code-barres ou un nom de jeu.");
        resultsBox.innerHTML = "";
        resultsBox.classList.add("hidden");
        return;
      }

      setStatus("Recherche jeu", "Vérification en cours...");
      resultsBox.innerHTML = "";
      resultsBox.classList.add("hidden");
      document.getElementById("jeuSelection").classList.add("hidden");
      document.getElementById("exemplairesZone").innerHTML = "";
      document.getElementById("exemplairesZone").classList.add("hidden");
      exemplaireChoisi = null;

      try {
        const directUrl = API_URL
          + "?action=getJeuByEAN"
          + "&ean=" + encodeURIComponent(input);

        const directResponse = await fetch(directUrl);
        const directData = await directResponse.json();

        if (directData.found) {
          await selectionnerJeu(directData);
          return;
        }

        const searchUrl = API_URL
          + "?action=searchJeux"
          + "&query=" + encodeURIComponent(input);

        const searchResponse = await fetch(searchUrl);
        const searchData = await searchResponse.json();

        if (!searchData.ok || !Array.isArray(searchData.results) || searchData.results.length === 0) {
          setStatus("Aucun résultat", "Aucun jeu trouvé.");
          return;
        }

        searchData.results.forEach(item => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <div class="result-main">${item.nom_jeu}</div>
            <div class="result-sub">ID : ${item.id_jeu}</div>
          `;
          div.onclick = async () => {
            await selectionnerJeu(item);
            resultsBox.classList.add("hidden");
          };
          resultsBox.appendChild(div);
        });

        resultsBox.classList.remove("hidden");
        setStatus("Résultats trouvés", "Choisis un jeu dans la liste.");

      } catch (error) {
        setStatus("Erreur", error.message);
      }
    }

    async function selectionnerJeu(item) {
      jeuCourant = item;
      exemplaireChoisi = null;

      document.getElementById("jeuSelection").classList.remove("hidden");
      document.getElementById("jeuNomSelection").textContent = item.nom_jeu || "";

      if (!item.empruntable && !item.emprunt_autorise) {
        document.getElementById("jeuEtatSelection").textContent = "Jeu désactivé.";
        setStatus("Jeu non empruntable", "Ce jeu est désactivé.");
        document.getElementById("exemplairesZone").innerHTML = "";
        document.getElementById("exemplairesZone").classList.add("hidden");
        return;
      }

      document.getElementById("jeuEtatSelection").textContent = "Jeu trouvable et empruntable.";
      await chargerExemplaires(item.id_jeu);
    }

    async function chargerExemplaires(idJeu) {
      setStatus("Recherche exemplaires", "Chargement...");

      try {
        const url = API_URL
          + "?action=getExemplairesDisponiblesByJeu"
          + "&id_jeu=" + encodeURIComponent(idJeu);

        const response = await fetch(url);
        const data = await response.json();

        const zone = document.getElementById("exemplairesZone");
        zone.innerHTML = "";

        if (!data.exemplaires_disponibles || data.exemplaires_disponibles.length === 0) {
          setStatus("Aucun exemplaire", "Tous les exemplaires sont actuellement empruntés.");
          zone.classList.add("hidden");
          return;
        }

        if (data.exemplaires_disponibles.length === 1) {
          const ex = data.exemplaires_disponibles[0];
          exemplaireChoisi = ex.id_exemplaire;

          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <div class="result-main">Exemplaire n°${ex.numero}</div>
            <div class="result-sub">Sélection automatique</div>
          `;
          zone.appendChild(div);
          zone.classList.remove("hidden");

          setStatus("Exemplaire trouvé", "Exemplaire sélectionné automatiquement.");
          return;
        }

        data.exemplaires_disponibles.forEach(ex => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <div class="result-main">Exemplaire n°${ex.numero}</div>
            <div class="result-sub">Cliquer pour sélectionner</div>
          `;

          div.onclick = () => {
            exemplaireChoisi = ex.id_exemplaire;
            setStatus("Exemplaire sélectionné", "Exemplaire n°" + ex.numero + " sélectionné.");
          };

          zone.appendChild(div);
        });

        zone.classList.remove("hidden");
        setStatus("Choix exemplaire", "Choisis un exemplaire disponible.");

      } catch (error) {
        setStatus("Erreur", error.message);
      }
    }
  </script>
</body>
</html>
