<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeKiffe - Emprunts</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 840px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      margin-bottom: 20px;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .input-row.two {
      grid-template-columns: 1fr auto;
    }

    .text-input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    .text-input:focus {
      border-color: var(--primary);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .btn-warning { background: var(--warning); }

    .status-box {
      border-radius: 14px;
      padding: 14px;
      background: #f9fafb;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status-box strong {
      color: var(--text);
    }

    .fiche {
      display: none;
    }

    .fiche.visible {
      display: block;
    }

    .fiche-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .badge-ok { background: var(--success); }
    .badge-ko { background: var(--danger); }

    .motif {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      font-size: 14px;
      line-height: 1.4;
    }

    .infos {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 8px;
    }

    .info-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
    }

    .info-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    .results {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .result-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fcfcfd;
      cursor: pointer;
    }

    .result-item:hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .result-main {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 13px;
      color: var(--muted);
    }

    #scannerZone {
      margin-top: 14px;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin-top: 12px;
    }

    @media (max-width: 700px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .input-row.two {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Gestion des emprunts</h1>
      <p class="subtitle">
        Scanne le code adhérent, utilise la caméra, ou cherche par nom / prénom.
      </p>
    </header>

    <section class="card">
      <label for="codeAdherent" class="label">Code adhérent</label>
      <div class="input-row">
        <input
          id="codeAdherent"
          class="text-input"
          type="text"
          placeholder="Scanne ou saisis le code adhérent"
        />
        <button class="btn btn-primary" onclick="verifierAdherent()">
          Vérifier
        </button>
        <button id="btnCamera" class="btn btn-warning" onclick="toggleScanner()">
          Scanner caméra
        </button>
      </div>

      <div id="scannerZone" class="hidden">
        <div id="reader"></div>
      </div>
    </section>

    <section class="card">
      <label for="searchAdherent" class="label">Recherche nom / prénom</label>
      <div class="input-row two">
        <input
          id="searchAdherent"
          class="text-input"
          type="text"
          placeholder="Exemple : marie, gazé, marie gazé..."
        />
        <button class="btn btn-primary" onclick="rechercherAdherents()">
          Rechercher
        </button>
      </div>

      <div id="searchResults" class="results hidden"></div>
    </section>

    <section class="card">
      <div id="statusBox" class="status-box">
        <strong>Prêt.</strong><br>
        En attente d’un scan ou d’une recherche adhérent.
      </div>
    </section>

    <section id="ficheAdherent" class="card fiche">
      <div class="fiche-header">
        <div id="nomComplet" class="name"></div>
        <div id="badgeStatut" class="badge"></div>
      </div>

      <div id="motifBlocage" class="motif hidden"></div>

      <div class="infos">
        <div class="info-item">
          <div class="info-label">Emprunts en cours</div>
          <div id="empruntsEnCours" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Statut emprunt</div>
          <div id="statutEmprunt" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Jeux en cours</div>
          <div id="jeuxEnCours" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Nombre de retards</div>
          <div id="nbRetards" class="info-value"></div>
        </div>

        <div class="info-item">
          <div class="info-label">Profil</div>
          <div id="profil" class="info-value"></div>
        </div>
      </div>

      <div class="actions">
        <button id="btnScannerJeu" class="btn btn-success hidden" onclick="scannerJeu()">
          Scanner un jeu
        </button>

        <button class="btn btn-danger" onclick="reinitialiserFiche()">
          Réinitialiser
        </button>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxvASN1BbWvvwLn2zRg_t_1GgysJaeNk2jJhQMMXHitTdrea8Ub2a3Kq-7pZpBVTMRSLQ/exec";

    let adherentCourant = null;
    let scannerInstance = null;
    let scannerActif = false;

    function setStatus(title, text) {
      const box = document.getElementById("statusBox");
      box.innerHTML = "<strong>" + title + "</strong><br>" + text;
    }

    function afficherFiche(data) {
      adherentCourant = data;

      document.getElementById("ficheAdherent").classList.add("visible");
      document.getElementById("nomComplet").textContent = data.nom_complet || "";

      const badge = document.getElementById("badgeStatut");
      const peutEmprunter = String(data.peut_emprunter || "").toLowerCase() === "oui";

      badge.textContent = peutEmprunter ? "Peut emprunter" : "Emprunt impossible";
      badge.className = "badge " + (peutEmprunter ? "badge-ok" : "badge-ko");

      const motifBox = document.getElementById("motifBlocage");
      if (!peutEmprunter && data.motif_blocage) {
        motifBox.textContent = data.motif_blocage;
        motifBox.classList.remove("hidden");
      } else {
        motifBox.textContent = "";
        motifBox.classList.add("hidden");
      }

      document.getElementById("empruntsEnCours").textContent = data.emprunts_en_cours ?? "";
      document.getElementById("statutEmprunt").textContent = data.statut_emprunt || "";
      document.getElementById("jeuxEnCours").textContent = data.jeux_en_cours || "";
      document.getElementById("nbRetards").textContent = data.nb_retards ?? "";
      document.getElementById("profil").textContent = data.profil || "";

      const btnScannerJeu = document.getElementById("btnScannerJeu");
      if (peutEmprunter) {
        btnScannerJeu.classList.remove("hidden");
      } else {
        btnScannerJeu.classList.add("hidden");
      }
    }

    function reinitialiserFiche() {
      adherentCourant = null;
      document.getElementById("ficheAdherent").classList.remove("visible");
      document.getElementById("codeAdherent").value = "";
      document.getElementById("searchAdherent").value = "";
      document.getElementById("searchResults").innerHTML = "";
      document.getElementById("searchResults").classList.add("hidden");
      setStatus("Prêt.", "En attente d’un scan ou d’une recherche adhérent.");
      document.getElementById("codeAdherent").focus();
    }

    async function verifierAdherent() {
      const code = document.getElementById("codeAdherent").value.trim();

      if (!code) {
        setStatus("Code manquant", "Saisis ou scanne un code adhérent.");
        return;
      }

      setStatus("Recherche adhérent", "Vérification en cours...");
      document.getElementById("ficheAdherent").classList.remove("visible");

      try {
        const url = API_URL
          + "?action=getAdherentByCode"
          + "&code=" + encodeURIComponent(code);

        const response = await fetch(url);
        const data = await response.json();

        if (!data.found) {
          setStatus("Adhérent introuvable", data.message || "Aucun résultat.");
          return;
        }

        afficherFiche(data);

        if (String(data.peut_emprunter || "").toLowerCase() === "oui") {
          setStatus("Adhérent autorisé", "Tu peux passer au scan du jeu.");
        } else {
          setStatus("Adhérent bloqué", data.motif_blocage || "Emprunt impossible.");
        }
      } catch (error) {
        setStatus("Erreur", error.message);
      }
    }

    async function rechercherAdherents() {
      const query = document.getElementById("searchAdherent").value.trim();
      const resultsBox = document.getElementById("searchResults");

      if (!query) {
        setStatus("Recherche vide", "Saisis un nom ou un prénom.");
        resultsBox.innerHTML = "";
        resultsBox.classList.add("hidden");
        return;
      }

      setStatus("Recherche adhérents", "Recherche en cours...");
      resultsBox.innerHTML = "";
      resultsBox.classList.add("hidden");

      try {
        const url = API_URL
          + "?action=searchAdherents"
          + "&query=" + encodeURIComponent(query);

        const response = await fetch(url);
        const data = await response.json();

        if (!data.ok || !Array.isArray(data.results) || data.results.length === 0) {
          setStatus("Aucun résultat", "Aucun adhérent ne correspond à cette recherche.");
          return;
        }

        resultsBox.innerHTML = "";
        data.results.forEach(item => {
          const div = document.createElement("div");
          div.className = "result-item";
          div.innerHTML = `
            <div class="result-main">${item.nom_complet}</div>
            <div class="result-sub">ID : ${item.id_adherent} · Profil : ${item.profil}</div>
          `;
          div.onclick = () => {
            document.getElementById("codeAdherent").value = item.id_adherent;
            afficherFiche(item);

            if (String(item.peut_emprunter || "").toLowerCase() === "oui") {
              setStatus("Adhérent sélectionné", "Tu peux passer au scan du jeu.");
            } else {
              setStatus("Adhérent bloqué", item.motif_blocage || "Emprunt impossible.");
            }

            resultsBox.classList.add("hidden");
          };
          resultsBox.appendChild(div);
        });

        resultsBox.classList.remove("hidden");
        setStatus("Résultats trouvés", "Choisis un adhérent dans la liste.");
      } catch (error) {
        setStatus("Erreur", error.message);
      }
    }

    async function toggleScanner() {
      const zone = document.getElementById("scannerZone");
      const btn = document.getElementById("btnCamera");

      if (scannerActif) {
        await stopScanner();
        zone.classList.add("hidden");
        btn.textContent = "Scanner caméra";
        setStatus("Scanner arrêté", "Tu peux reprendre une saisie manuelle.");
        return;
      }

      zone.classList.remove("hidden");
      btn.textContent = "Arrêter caméra";
      setStatus("Scanner caméra", "Présente le code-barres ou le QR code adhérent devant la caméra.");

      try {
        scannerInstance = new Html5Qrcode("reader");
        await scannerInstance.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          async (decodedText) => {
            document.getElementById("codeAdherent").value = decodedText;
            await stopScanner();
            zone.classList.add("hidden");
            btn.textContent = "Scanner caméra";
            await verifierAdherent();
          },
          () => {}
        );

        scannerActif = true;
      } catch (error) {
        zone.classList.add("hidden");
        btn.textContent = "Scanner caméra";
        setStatus("Caméra indisponible", error.message || "Impossible de lancer la caméra.");
      }
    }

    async function stopScanner() {
      if (scannerInstance && scannerActif) {
        await scannerInstance.stop();
        await scannerInstance.clear();
      }
      scannerActif = false;
      scannerInstance = null;
    }

    function scannerJeu() {
      setStatus("Étape suivante", "Le scan du jeu sera branché juste après.");
    }
  </script>
</body>
</html>
